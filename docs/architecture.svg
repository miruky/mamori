<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" role="img" aria-label="mamoriのアーキテクチャ図">
  <title>mamoriのアーキテクチャ: 入力からUIループ、ゲーム中核、データ部品までの流れ</title>
  <style>
    .box { fill: #fdfefe; stroke: #d3dde1; }
    .zone { fill: #eef1f5; stroke: #dde3e9; }
    .t { font-family: 'Hiragino Sans', 'Noto Sans JP', system-ui, sans-serif; fill: #1b2530; }
    .h { font-size: 13px; font-weight: 600; }
    .s { font-size: 11px; fill: #586273; }
    .zl { font-size: 11px; font-weight: 700; fill: #138a5a; letter-spacing: 1px; }
    .arrow { stroke: #8a97a6; stroke-width: 1.6; fill: none; marker-end: url(#head); }
    .mono { font-family: 'SFMono-Regular', Consolas, monospace; }
    @media (prefers-color-scheme: dark) {
      .box { fill: #161b22; stroke: #2b3440; }
      .zone { fill: #11151b; stroke: #232c38; }
      .t { fill: #dbe3ec; }
      .s { fill: #8d99a8; }
      .zl { fill: #4fb87a; }
      .arrow { stroke: #6b7886; }
    }
  </style>
  <defs>
    <marker id="head" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#8a97a6" />
    </marker>
  </defs>

  <rect class="zone" x="20" y="20" width="780" height="86" rx="13" />
  <text class="t zl" x="36" y="44">入力</text>
  <rect class="box" x="36" y="54" width="372" height="50" rx="9" />
  <text class="t h" x="52" y="78">塔の選択</text>
  <text class="t s" x="52" y="94">パレット、または数字キー 1-4</text>
  <rect class="box" x="428" y="54" width="356" height="50" rx="9" />
  <text class="t h" x="444" y="78">盤面クリック / タップ</text>
  <text class="t s" x="444" y="94">建設できるマスに塔を置く</text>

  <path class="arrow" d="M410 106 V132" />

  <rect class="zone" x="20" y="134" width="780" height="118" rx="13" />
  <text class="t zl mono" x="36" y="158">UIループ (src/main.ts)</text>
  <rect class="box" x="36" y="168" width="240" height="74" rx="9" />
  <text class="t h" x="52" y="192">SVG描画</text>
  <text class="t s" x="52" y="210">盤面・経路・塔・敵・</text>
  <text class="t s" x="52" y="226">投射物をSVGで描く</text>
  <rect class="box" x="288" y="168" width="240" height="74" rx="9" />
  <text class="t h" x="304" y="192">rAFループ</text>
  <text class="t s" x="304" y="210">毎フレーム step(dt) を</text>
  <text class="t s" x="304" y="226">呼んで時間を進める</text>
  <rect class="box" x="540" y="168" width="244" height="74" rx="9" />
  <text class="t h" x="556" y="192">操作の反映</text>
  <text class="t s" x="556" y="210">設置・強化・売却・</text>
  <text class="t s" x="556" y="226">ウェーブ開始・速度</text>

  <path class="arrow" d="M300 252 V286" />
  <text class="t s mono" x="308" y="273">step(dt)</text>
  <path class="arrow" d="M520 286 V252" />
  <text class="t s" x="512" y="273" text-anchor="end">状態を読んで描画</text>

  <rect class="zone" x="20" y="288" width="780" height="92" rx="13" />
  <text class="t zl mono" x="36" y="312">ゲーム中核 (src/lib/game.ts)</text>
  <rect class="box" x="36" y="322" width="748" height="48" rx="9" />
  <text class="t h" x="52" y="344">ウェーブ進行・敵の前進・塔の照準と発射・誘導する投射物</text>
  <text class="t s" x="52" y="362">命中判定と範囲ダメージ・鈍化・賞金と残機・勝敗の決定</text>

  <path class="arrow" d="M410 380 V406" />
  <text class="t s" x="418" y="397">参照</text>

  <rect class="zone" x="20" y="408" width="780" height="94" rx="13" />
  <text class="t zl mono" x="36" y="432">データ (src/lib)</text>
  <rect class="box" x="36" y="442" width="240" height="52" rx="9" />
  <text class="t h mono" x="52" y="466">path.ts</text>
  <text class="t s" x="52" y="484">経路と建設可否</text>
  <rect class="box" x="288" y="442" width="240" height="52" rx="9" />
  <text class="t h mono" x="304" y="466">towers.ts</text>
  <text class="t s" x="304" y="484">塔の定義と強化</text>
  <rect class="box" x="540" y="442" width="244" height="52" rx="9" />
  <text class="t h mono" x="556" y="466">enemies.ts</text>
  <text class="t s" x="556" y="484">敵とウェーブ表</text>

  <text class="t s" x="410" y="514" text-anchor="middle">
    乱数を使わないため、同じ操作と同じ時間刻みからは常に同じ展開になる
  </text>
</svg>
